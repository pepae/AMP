<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMP — Agent Marketplace Protocol</title>
    <script>
      // Restore hash-based routes encoded by 404.html for GitHub Pages.
      (function() {
        var search = window.location.search;
        if (search.indexOf('?p=') === 0 || search.indexOf('&p=') > -1) {
          var params = search.slice(1).split('&').reduce(function(p, s) {
            var e = s.split('=');
            p[e[0]] = e.slice(1).join('=').replace(/~and~/g, '&');
            return p;
          }, {});
          if (params.p !== undefined) {
            var base = window.location.pathname.split('/').slice(0, 2).join('/');
            var path = String(params.p).replace(/^\/+/, '');
            var target = base + '/';
            if (path) {
              target += '#/' + path;
            }
            history.replaceState(
              null, null,
              target + (params.q ? '?' + params.q : '')
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
