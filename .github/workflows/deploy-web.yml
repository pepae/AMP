name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "amp-protocol/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: amp-protocol/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: amp-protocol/web

      - name: Build
        run: npm run build
        working-directory: amp-protocol/web
        env:
          # pepae.github.io/AMP/ — must match the repo name exactly
          VITE_BASE_URL: /AMP/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: amp-protocol/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
